name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Create ZIP with correct folder name
      run: |
        # 创建临时目录并复制文件
        mkdir -p /tmp/brave-love
        cp -r . /tmp/brave-love/
        # 删除不需要的文件
        rm -rf /tmp/brave-love/.git
        rm -rf /tmp/brave-love/.github
        rm -f /tmp/brave-love/.gitignore
        # 创建 ZIP，使用固定文件名 brave-love.zip
        cd /tmp
        zip -r brave-love.zip brave-love/
        # 移动回工作目录
        mv brave-love.zip ${{ github.workspace }}/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: brave-love.zip
        body: |
          ## Brave Love ${{ github.ref_name }}
          
          一个浪漫的 WordPress 情侣主题
          
          ### 安装/更新方法
          
          **方法一：直接覆盖（推荐）**
          1. 下载 `brave-love.zip`
          2. 解压后会得到 `brave-love/` 文件夹
          3. 通过 FTP 上传到 `wp-content/themes/brave-love/`，覆盖原有文件
          4. 清除浏览器缓存
          
          **方法二：WordPress 后台**
          1. 外观 → 主题
          2. 如果已有旧版本，先删除旧主题
          3. 上传 `brave-love.zip`
          4. 启用主题
          
          ### ⚠️ 重要提示
          
          主题文件夹名称**必须是** `brave-love`。
          
          如果之前安装过旧版本，建议通过 FTP 直接覆盖文件，这样可以保留所有设置和数据。
          
          详见 [UPDATE-GUIDE.md](https://github.com/unclecat/WP_Brave/blob/main/UPDATE-GUIDE.md)
          
          ### 更新日志
          
          #### v0.1.1
          - 🐛 修复计时器日期解析问题
          - 🐛 修复相册照片管理界面
          - 💄 优化首页日期显示
          
          #### v0.1
          - ✨ 初始版本发布
          
          ### 功能特性
          - 💕 恋爱计时器
          - 📅 纪念日管理
          - 💖 点点滴滴
          - 📜 恋爱清单
          - 📷 甜蜜相册
          - 📝 随笔说说
          - 💌 祝福留言
          
          ### 系统要求
          - WordPress 6.0+
          - PHP 7.4+
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
